<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 40" width="130" height="40">
  <!-- Truck body -->
  <rect x="2" y="14" width="22" height="14" rx="2" fill="#22C55E"/>
  <!-- Truck cab -->
  <rect x="24" y="17" width="10" height="11" rx="1" fill="#22C55E"/>
  <!-- Cab window -->
  <rect x="25.5" y="18.5" width="7" height="5" rx="1" fill="#86EFAC"/>
  <!-- Truck wheels -->
  <circle cx="9" cy="29" r="4" fill="#166534"/>
  <circle cx="9" cy="29" r="2" fill="#22C55E"/>
  <circle cx="27" cy="29" r="4" fill="#166534"/>
  <circle cx="27" cy="29" r="2" fill="#22C55E"/>
  <!-- Exhaust pipe -->
  <rect x="32" y="13" width="2" height="5" rx="1" fill="#166534"/>
  <!-- Cash On Delivery text -->
  <text x="40" y="19" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="700" fill="#22C55E" letter-spacing="0.2">Cash on</text>
  <text x="40" y="31" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="700" fill="#22C55E" letter-spacing="0.2">Delivery</text>
</svg>
