name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 187.124.15.31
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/oshicart/deploy.sh
