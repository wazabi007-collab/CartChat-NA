<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100" height="40">
  <!-- Wallet body -->
  <rect x="4" y="12" width="28" height="18" rx="3" ry="3" fill="#F59E0B"/>
  <!-- Wallet flap/top fold -->
  <rect x="4" y="12" width="28" height="6" rx="3" ry="3" fill="#D97706"/>
  <!-- Coin slot / card slot -->
  <rect x="24" y="18" width="8" height="6" rx="2" ry="2" fill="white" opacity="0.8"/>
  <!-- Coin circle in slot -->
  <circle cx="28" cy="21" r="2.5" fill="#F59E0B"/>
  <!-- Strap line -->
  <line x1="4" y1="20" x2="32" y2="20" stroke="#D97706" stroke-width="1"/>
  <!-- eWallet text -->
  <text x="38" y="27" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" letter-spacing="0.3">eWallet</text>
</svg>
