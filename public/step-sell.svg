<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <defs>
    <filter id="shadow3" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#15803D" flood-opacity="0.25"/>
    </filter>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#15803D" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="140" cy="175" r="115" fill="#DCFCE7"/>

  <!-- Phone body -->
  <rect x="80" y="90" width="120" height="195" rx="14" fill="#1F2937"/>
  <!-- Phone screen -->
  <rect x="86" y="100" width="108" height="175" rx="8" fill="#F8FAFC"/>
  <!-- Notch -->
  <rect x="117" y="96" width="46" height="9" rx="4.5" fill="#111827"/>

  <!-- WhatsApp icon on screen -->
  <!-- Green background circle -->
  <circle cx="140" cy="168" r="36" fill="#25D366"/>
  <!-- Phone in chat bubble (WhatsApp logo style) -->
  <path d="M140 140 C124 140 111 152 111 166 C111 171 112.5 175.5 115 179.5 L111 191 L123.5 187.5 C127 189.5 133.2 190.5 140 190.5 C156 190.5 169 178.5 169 164.5 C169 150.5 156 140 140 140Z" fill="white"/>
  <!-- Phone handset inside bubble -->
  <path d="M130 156 C129 157 129 159 130 161 L133 164 C133 164 131.5 167 130 168.5 C128.5 170 126 168.5 126 168.5 L123 165.5 C121 163.5 121 160 123 158 L126 155 C127 154 129 154 130 156Z" fill="#25D366"/>
  <path d="M145 170 C146 171 146 173 145 174 L142 177 C142 177 139.5 175.5 138 174 C136.5 172.5 135 170 135 170 L138 167 C139 166 141 166 142 168Z" fill="#25D366"/>
  <line x1="130" y1="161" x2="135" y2="170" stroke="#25D366" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Screen label below icon -->
  <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#64748B" font-weight="600" letter-spacing="0.3">CUSTOMER MESSAGES</text>
  <text x="140" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94A3B8">3 new orders today</text>

  <!-- Hand holding phone -->
  <ellipse cx="140" cy="295" rx="48" ry="30" fill="#D4A574"/>
  <path d="M88 255 Q78 245 80 232 Q82 222 90 220 Q98 218 100 228 L100 265 Q94 262 88 255Z" fill="#D4A574"/>
  <path d="M96 225 Q94 210 100 198 Q104 190 110 192 Q116 194 115 204 L112 248 Q104 240 96 225Z" fill="#D4A574"/>
  <path d="M114 220 Q113 204 119 193 Q123 185 130 187 Q136 189 135 200 L132 248 Q123 242 114 220Z" fill="#D4A574"/>
  <path d="M133 222 Q132 207 138 197 Q142 190 148 192 Q154 194 153 204 L150 248 Q142 243 133 222Z" fill="#D4A574"/>
  <path d="M151 228 Q150 215 155 207 Q158 202 163 204 Q168 206 167 214 L164 250 Q158 247 151 228Z" fill="#D4A574"/>
  <path d="M88 260 Q88 290 94 308 Q100 320 140 318 Q180 316 184 300 L180 258 Q175 270 168 268 Q160 266 160 256 L152 256 Q152 266 144 268 Q136 270 132 260 L128 260 Q128 270 120 272 Q112 274 108 264 L100 264 Z" fill="#D4A574"/>
  <ellipse cx="105" cy="228" rx="4" ry="2.5" fill="#C4946A" opacity="0.5"/>
  <ellipse cx="123" cy="222" rx="4" ry="2.5" fill="#C4946A" opacity="0.5"/>
  <ellipse cx="141" cy="224" rx="4" ry="2.5" fill="#C4946A" opacity="0.5"/>
  <ellipse cx="158" cy="230" rx="4" ry="2.5" fill="#C4946A" opacity="0.5"/>

  <!-- Document/receipt icon floating left side -->
  <g transform="translate(50, 148)">
    <rect width="32" height="40" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <!-- Receipt lines -->
    <line x1="6" y1="10" x2="26" y2="10" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="26" y2="16" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="22" x2="20" y2="22" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="28" x2="26" y2="28" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Checkmark -->
    <circle cx="24" cy="32" r="6" fill="#22C55E"/>
    <path d="M21 32 L23 34 L27 30" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ORDER CONFIRMED badge - top right, floating -->
  <g filter="url(#badgeShadow)">
    <rect x="170" y="95" width="96" height="26" rx="13" fill="#22C55E"/>
    <!-- Checkmark circle -->
    <circle cx="186" cy="108" r="8" fill="white" opacity="0.25"/>
    <path d="M183 108 L185 110 L189 106" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="198" y="113" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="white" letter-spacing="0.3">ORDER</text>
    <text x="198" y="123" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="white" letter-spacing="0.3">CONFIRMED</text>
  </g>

  <!-- Connecting line from badge to phone -->
  <path d="M192 121 Q192 130 200 136" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- EFT ATTACHED badge - below the first badge -->
  <g filter="url(#badgeShadow)">
    <rect x="176" y="132" width="84" height="22" rx="11" fill="#16A34A"/>
    <!-- Paperclip icon area -->
    <path d="M189 143 C189 140 191 138 194 138 C197 138 199 140 199 143 L199 147 C199 149 197 151 194 151 L193 151 C191 151 189 149 189 147" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="202" y="147" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="white" letter-spacing="0.3">EFT ATTACHED</text>
  </g>

  <!-- Small NAD coin/money indicator -->
  <circle cx="58" cy="112" r="16" fill="#FCD34D" filter="url(#badgeShadow)"/>
  <text x="58" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#92400E">N$</text>
</svg>
