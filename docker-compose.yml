services:
  # ─── Next.js App ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3080:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:8090
      - SUPABASE_URL=http://supabase-kong:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - WATCHPACK_POLLING=true
    depends_on:
      supabase-kong:
        condition: service_healthy
    networks:
      - chatcart

  # ─── Supabase Postgres ─────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.8.1.060
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chatcart

  # ─── Database Init (set role passwords before auth starts) ─
  supabase-db-init:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Setting role passwords..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U supabase_admin -d postgres -c "
          ALTER ROLE supabase_auth_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';
          ALTER ROLE authenticator WITH PASSWORD '$${POSTGRES_PASSWORD}';
          ALTER ROLE supabase_storage_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';
        "
        echo "Role passwords set!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - chatcart
    restart: "no"

  # ─── Supabase Auth (GoTrue) ────────────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.170.0
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:8090
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-chatcart_secret}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: smtp.resend.com
      GOTRUE_SMTP_PORT: "465"
      GOTRUE_SMTP_USER: resend
      GOTRUE_SMTP_PASS: ${RESEND_API_KEY} 
      GOTRUE_SMTP_SENDER_NAME: OshiCart
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@send.octovianexus.com
      GOTRUE_SMS_PROVIDER: "twilio"
      GOTRUE_SMS_TWILIO_ACCOUNT_SID: "test"
      GOTRUE_SMS_TWILIO_AUTH_TOKEN: "test"
      GOTRUE_SMS_TWILIO_MESSAGE_SERVICE_SID: "test"
      GOTRUE_SMS_TEST_OTP: "264811234567:123456,264812345678:123456,264819999999:123456,264811111111:123456,264812222222:123456,264813333333:123456,264814444444:123456,264815555555:123456"
      GOTRUE_SMS_TEST_OTP_VALID_UNTIL: "2030-01-01T00:00:00Z"
      GOTRUE_RATE_LIMIT_OTP: "100"
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
    networks:
      - chatcart

  # ─── Database Migration (runs after auth creates schema) ─
  supabase-db-migrate:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for auth schema to be created..."
        sleep 10
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM pg_namespace WHERE nspname = 'auth'" | grep -q 1; do
          echo "auth schema not ready, waiting..."
          sleep 3
        done
        echo "auth schema found. Running migration..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -f /migrations/001_initial_schema.sql
        echo "Migration complete!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
    volumes:
      - ./supabase/migrations/001_initial_schema.sql:/migrations/001_initial_schema.sql:ro
    depends_on:
      supabase-auth:
        condition: service_started
    networks:
      - chatcart
    restart: "no"

  # ─── Supabase REST (PostgREST) ─────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.8
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-chatcart_secret}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
    networks:
      - chatcart

  # ─── Supabase Storage ──────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:v1.14.3
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-chatcart_secret}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 5242880
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:8080
    volumes:
      - supabase-storage-data:/var/lib/storage
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      supabase-rest:
        condition: service_started
    networks:
      - chatcart

  # ─── Storage Buckets Migration ──────────────────────────
  supabase-storage-migrate:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for storage schema and functions..."
        sleep 20
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM pg_namespace WHERE nspname = 'storage'" | grep -q 1; do
          echo "storage schema not ready, waiting..."
          sleep 5
        done
        echo "storage schema found. Waiting for storage.buckets table..."
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM information_schema.tables WHERE table_schema = 'storage' AND table_name = 'buckets'" | grep -q 1; do
          echo "storage.buckets table not ready, waiting..."
          sleep 5
        done
        echo "Waiting for storage functions (foldername)..."
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM pg_proc WHERE proname = 'foldername' AND pronamespace = (SELECT oid FROM pg_namespace WHERE nspname = 'storage')" | grep -q 1; do
          echo "storage.foldername not ready, waiting..."
          sleep 5
        done
        echo "All storage prerequisites ready. Running migration..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -f /migrations/002_storage_buckets.sql
        echo "Storage buckets created!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
    volumes:
      - ./supabase/migrations/002_storage_buckets.sql:/migrations/002_storage_buckets.sql:ro
    depends_on:
      supabase-storage:
        condition: service_started
    networks:
      - chatcart
    restart: "no"

  # ─── Supabase Image Proxy ──────────────────────────────
  supabase-imgproxy:
    image: darthsim/imgproxy:v3.8.0
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - chatcart

  # ─── Supabase Kong (API Gateway) ───────────────────────
  supabase-kong:
    image: kong:2.8.1
    ports:
      - "8090:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - chatcart

  # ─── Supabase Studio (Dashboard UI) ────────────────────
  supabase-studio:
    image: supabase/studio:20241202-71e5240
    ports:
      - "3100:3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
      DEFAULT_ORGANIZATION_NAME: ChatCart NA
      DEFAULT_PROJECT_NAME: chatcart-na
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8090
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ""
      LOGFLARE_URL: ""
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    depends_on:
      supabase-kong:
        condition: service_healthy
    networks:
      - chatcart

  # ─── Supabase Meta (pg-meta) ───────────────────────────
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    ports:
      - "8085:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-chatcart_secret}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - chatcart

volumes:
  supabase-db-data:
  supabase-storage-data:

networks:
  chatcart:
    driver: bridge
