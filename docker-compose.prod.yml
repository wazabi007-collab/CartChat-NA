services:
  # ─── Caddy (Reverse Proxy + Auto SSL) ────────────

  # ─── Next.js App (Production) ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=https://oshicart.octovianexus.com/supabase
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
        - NEXT_PUBLIC_SITE_URL=https://oshicart.octovianexus.com
    ports:
      - "3080:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=https://oshicart.octovianexus.com/supabase
      - SUPABASE_URL=http://supabase-kong:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://oshicart.octovianexus.com
    depends_on:
      supabase-kong:
        condition: service_healthy
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Supabase Postgres ───────────────────────────
  supabase-db:
    image: supabase/postgres:15.8.1.060
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Database Init ──────────────────────────────
  supabase-db-init:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Setting role passwords..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U supabase_admin -d postgres -c "
          ALTER ROLE supabase_auth_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';
          ALTER ROLE authenticator WITH PASSWORD '$${POSTGRES_PASSWORD}';
          ALTER ROLE supabase_storage_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';
        "
        echo "Role passwords set!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - oshicart
    restart: "no"

  # ─── Supabase Auth (GoTrue) ─────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.170.0
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: https://oshicart.octovianexus.com/supabase
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: https://oshicart.octovianexus.com
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_AUTOCONFIRM: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: smtp.resend.com
      GOTRUE_SMTP_PORT: 465
      GOTRUE_SMTP_USER: resend
      GOTRUE_SMTP_PASS: ${RESEND_API_KEY}
      GOTRUE_SMTP_SENDER_NAME: OshiCart
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@send.octovianexus.com
      # TODO: Replace with real Twilio credentials for production
      GOTRUE_SMS_PROVIDER: "twilio"
      GOTRUE_SMS_TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      GOTRUE_SMS_TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      GOTRUE_SMS_TWILIO_MESSAGE_SERVICE_SID: ${TWILIO_MESSAGE_SERVICE_SID}
      GOTRUE_RATE_LIMIT_OTP: "10"
      GOTRUE_MAILER_OTP_EXP: "300"
      GOTRUE_SMS_OTP_EXP: "300"
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Database Migration ─────────────────────────
  supabase-db-migrate:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for auth schema..."
        sleep 10
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM pg_namespace WHERE nspname = 'auth'" | grep -q 1; do
          echo "auth schema not ready, waiting..."
          sleep 3
        done
        echo "Running migration..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -f /migrations/001_initial_schema.sql
        echo "Migration complete!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations/001_initial_schema.sql:/migrations/001_initial_schema.sql:ro
    depends_on:
      supabase-auth:
        condition: service_started
    networks:
      - oshicart
    restart: "no"

  # ─── Supabase REST (PostgREST) ──────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Supabase Storage ───────────────────────────
  supabase-storage:
    image: supabase/storage-api:v1.14.3
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 5242880
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:8080
    volumes:
      - supabase-storage-data:/var/lib/storage
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      supabase-rest:
        condition: service_started
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Storage Buckets Migration ──────────────────
  supabase-storage-migrate:
    image: supabase/postgres:15.8.1.060
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for storage prerequisites..."
        sleep 20
        until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -c "SELECT 1 FROM pg_proc WHERE proname = 'foldername' AND pronamespace = (SELECT oid FROM pg_namespace WHERE nspname = 'storage')" | grep -q 1; do
          echo "storage not ready, waiting..."
          sleep 5
        done
        echo "Running storage migration..."
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h supabase-db -U postgres -d postgres -f /migrations/002_storage_buckets.sql
        echo "Storage buckets created!"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations/002_storage_buckets.sql:/migrations/002_storage_buckets.sql:ro
    depends_on:
      supabase-storage:
        condition: service_started
    networks:
      - oshicart
    restart: "no"

  # ─── Supabase Image Proxy ──────────────────────
  supabase-imgproxy:
    image: darthsim/imgproxy:v3.8.0
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - oshicart
    restart: unless-stopped

  # ─── Supabase Kong (API Gateway) ────────────────
  supabase-kong:
    ports:
      - "8090:8000"
    image: kong:2.8.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker/kong.prod.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - oshicart
    restart: unless-stopped

volumes:
  supabase-db-data:
  supabase-storage-data:

networks:
  oshicart:
    driver: bridge
