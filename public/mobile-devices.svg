<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Namibia map outline in background (simplified rectangular shape with Caprivi Strip) -->
  <g opacity="0.18">
    <!-- Main body of Namibia (roughly rectangular) -->
    <path d="M55,40 L160,40 L160,155 L100,155 L100,140 L55,140 Z" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Caprivi Strip (narrow strip going northeast) -->
    <path d="M160,55 L220,55 L220,68 L160,68 Z" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Walvis Bay notch approximation -->
    <path d="M55,95 L70,95 L70,108 L55,108 Z" fill="white" opacity="0.8"/>
  </g>

  <!-- LAPTOP (left, largest) -->
  <!-- Laptop screen bezel -->
  <rect x="10" y="35" width="110" height="75" rx="4" ry="4" fill="#374151"/>
  <!-- Laptop screen -->
  <rect x="14" y="39" width="102" height="65" rx="2" ry="2" fill="#F9FAFB"/>
  <!-- Store UI on laptop screen -->
  <!-- Nav bar -->
  <rect x="14" y="39" width="102" height="10" rx="2" ry="2" fill="#2B5EA7"/>
  <!-- OshiCart logo text placeholder -->
  <rect x="17" y="42" width="28" height="4" rx="1" fill="white" opacity="0.7"/>
  <!-- Product grid -->
  <rect x="17" y="54" width="28" height="22" rx="2" fill="#BFDBFE"/>
  <rect x="48" y="54" width="28" height="22" rx="2" fill="#BBF7D0"/>
  <rect x="79" y="54" width="28" height="22" rx="2" fill="#FDE68A"/>
  <!-- Product labels -->
  <rect x="17" y="78" width="28" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="48" y="78" width="28" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="79" y="78" width="28" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Second row products -->
  <rect x="17" y="84" width="28" height="15" rx="2" fill="#E9D5FF"/>
  <rect x="48" y="84" width="28" height="15" rx="2" fill="#FECACA"/>
  <rect x="79" y="84" width="28" height="15" rx="2" fill="#A7F3D0"/>
  <!-- Laptop base/hinge -->
  <rect x="8" y="110" width="114" height="6" rx="2" ry="2" fill="#4B5563"/>
  <!-- Laptop keyboard area -->
  <rect x="8" y="116" width="114" height="10" rx="2" ry="2" fill="#6B7280"/>
  <!-- Trackpad -->
  <rect x="48" y="118" width="34" height="6" rx="1" fill="#9CA3AF"/>

  <!-- TABLET (middle) -->
  <!-- Tablet bezel -->
  <rect x="136" y="50" width="60" height="85" rx="6" ry="6" fill="#374151"/>
  <!-- Tablet screen -->
  <rect x="140" y="56" width="52" height="70" rx="2" ry="2" fill="#F9FAFB"/>
  <!-- Store UI on tablet -->
  <!-- Nav bar -->
  <rect x="140" y="56" width="52" height="9" rx="2" ry="2" fill="#2B5EA7"/>
  <rect x="143" y="59" width="18" height="3" rx="1" fill="white" opacity="0.7"/>
  <!-- Product grid (2 col) -->
  <rect x="142" y="68" width="22" height="20" rx="2" fill="#BFDBFE"/>
  <rect x="167" y="68" width="22" height="20" rx="2" fill="#BBF7D0"/>
  <rect x="142" y="91" width="22" height="20" rx="2" fill="#FDE68A"/>
  <rect x="167" y="91" width="22" height="20" rx="2" fill="#E9D5FF"/>
  <!-- Labels -->
  <rect x="142" y="89" width="22" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="167" y="89" width="22" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="142" y="112" width="22" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="167" y="112" width="22" height="2" rx="1" fill="#D1D5DB"/>
  <!-- Home button indicator -->
  <circle cx="166" cy="130" r="3" fill="#6B7280"/>

  <!-- SMARTPHONE (right, smallest) -->
  <!-- Phone bezel -->
  <rect x="214" y="65" width="38" height="72" rx="7" ry="7" fill="#374151"/>
  <!-- Phone screen -->
  <rect x="218" y="72" width="30" height="58" rx="2" ry="2" fill="#F9FAFB"/>
  <!-- Notch -->
  <rect x="226" y="70" width="14" height="4" rx="2" fill="#374151"/>
  <!-- Store UI on phone -->
  <!-- Nav bar -->
  <rect x="218" y="72" width="30" height="8" rx="2" ry="2" fill="#2B5EA7"/>
  <rect x="220" y="74" width="12" height="3" rx="1" fill="white" opacity="0.7"/>
  <!-- Single column product list -->
  <rect x="220" y="83" width="26" height="14" rx="2" fill="#BFDBFE"/>
  <rect x="220" y="100" width="26" height="14" rx="2" fill="#BBF7D0"/>
  <rect x="220" y="117" width="26" height="9" rx="2" fill="#FDE68A"/>
  <!-- Labels -->
  <rect x="220" y="98" width="16" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="220" y="115" width="16" height="2" rx="1" fill="#D1D5DB"/>
  <!-- Home bar -->
  <rect x="227" y="133" width="12" height="2" rx="1" fill="#6B7280"/>

  <!-- Label text below devices -->
  <text x="65" y="140" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Desktop</text>
  <text x="166" y="145" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Tablet</text>
  <text x="233" y="148" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Mobile</text>
</svg>
